<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文学社接力小说游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .story-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .story-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .story-card.original {
            border-left: 5px solid #e74c3c;
        }
        
        .story-card.new {
            border-left: 5px solid #2ecc71;
        }
        
        .story-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .story-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .story-type.original {
            background: #ffebee;
            color: #c62828;
        }
        
        .story-type.new {
            background: #e8f5e8;
            color: #2e7d32;
        }
        
        .story-desc {
            color: #666;
            margin-bottom: 20px;
        }
        
        .story-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .join-btn {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 15px;
            width: 100%;
        }
        
        .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        
        .write-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #7f8c8d;
        }
        
        .close-btn:hover {
            color: #e74c3c;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        
        textarea {
            min-height: 200px;
            resize: vertical;
        }
        
        .submit-btn {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }
        
        .submit-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #c3e6cb;
        }
        
        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #f5c6cb;
        }
        
        .story-history {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        
        .history-item {
            margin-bottom: 15px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        
        .history-author {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .history-content {
            color: #555;
            line-height: 1.6;
        }
        
        .history-timestamp {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-top: 8px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .stories-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .modal-content {
                width: 95%;
                margin: 10% auto;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 文学社接力小说游戏</h1>
            <p class="subtitle">发挥你的创意，与同学们一起续写经典故事</p>
        </header>
        
        <div class="stories-grid" id="storiesGrid">
            <!-- 故事卡片将通过JavaScript动态加载 -->
        </div>
    </div>
    
    <!-- 写作模态框 -->
    <div class="write-modal" id="writeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">续写故事</h2>
                <button class="close-btn" onclick="closeWriteModal()">&times;</button>
            </div>
            
            <div id="storyHistory" class="story-history">
                <h3>故事历史：</h3>
                <div id="historyContainer">
                    <!-- 历史内容将通过JavaScript动态加载 -->
                </div>
            </div>
            
            <form id="writeForm">
                <div class="form-group">
                    <label for="authorName">作者姓名：</label>
                    <input type="text" id="authorName" required placeholder="请输入您的姓名">
                </div>
                
                <div class="form-group">
                    <label for="storyContent">续写内容：</label>
                    <textarea id="storyContent" required placeholder="请在这里续写故事，至少100字..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">提交续写</button>
            </form>
            
            <div class="success-message" id="successMessage">
                🎉 续写提交成功！感谢您的贡献！
            </div>
            
            <div class="error-message" id="errorMessage">
                ❌ 提交失败，请重试或联系管理员。
            </div>
        </div>
    </div>

    <script>
        // GitHub配置（需要配置）
        const GITHUB_CONFIG = {
            owner: 'liming575',               // GitHub用户名
            repo: 'literature-game-data-v2',     // 数据存储仓库
            token: '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'   // 已配置的GitHub Token
        };

        // 故事名称映射
        const STORY_NAMES = {
            'library': '《神秘的图书馆》',
            'forest': '《魔法森林的传说》',
            'city': '《时光倒流的城市》',
            'tutorial': '《弗尔滕帝国的抉择》',
            'fight': '《决战紫禁之巅》',
            'journey': '《西游记新传》'
        };

        // 故事描述
        const STORY_DESCRIPTIONS = {
            'library': '一位年轻学生意外发现了一本神奇的图书馆，这里隐藏着无数的秘密和奇遇...',
            'forest': '在茂密的魔法森林中，古老的传说苏醒，新英雄即将踏上拯救之路...',
            'city': '现代都市中，时间开始倒流，历史与现代交织在一座神秘的城市里...',
            'tutorial': '弗尔滕帝国的第三百七十二年，科技文明与古老魔法在历史的转折点上激烈碰撞...',
            'fight': '江湖传说中的终极对决，紫禁之巅的生死一战即将开始...',
            'journey': '西行取经的后世，新时代的大学生们踏上了完全不同的人生之旅...'
        };

        // 故事类型
        const STORY_TYPES = {
            'library': 'original',
            'forest': 'original', 
            'city': 'original',
            'tutorial': 'new',
            'fight': 'new',
            'journey': 'new'
        };

        let currentStory = null;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadStoryStats();
            setupEventListeners();
        });

        // 设置事件监听器
        function setupEventListeners() {
            const modal = document.getElementById('writeModal');
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeWriteModal();
                }
            });
        }

        // 加载故事统计
        async function loadStoryStats() {
            try {
                const storiesGrid = document.getElementById('storiesGrid');
                storiesGrid.innerHTML = '<div style="text-align: center; padding: 40px;">正在加载故事...</div>';

                // 获取所有故事数据
                const stories = Object.keys(STORY_NAMES);
                const statsPromises = stories.map(storyId => getStoryStats(storyId));
                const stats = await Promise.allSettled(statsPromises);

                // 渲染故事卡片
                storiesGrid.innerHTML = '';
                stats.forEach((result, index) => {
                    const storyId = stories[index];
                    if (result.status === 'fulfilled') {
                        renderStoryCard(storyId, result.value);
                    } else {
                        renderStoryCard(storyId, { count: 0, lastUpdate: null });
                    }
                });

            } catch (error) {
                console.error('加载故事统计失败:', error);
                document.getElementById('storiesGrid').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #e74c3c;">
                        无法加载故事数据，请稍后重试
                    </div>
                `;
            }
        }

        // 渲染故事卡片
        function renderStoryCard(storyId, stats) {
            const storyType = STORY_TYPES[storyId];
            const storyName = STORY_NAMES[storyId];
            const storyDesc = STORY_DESCRIPTIONS[storyId];
            
            const card = document.createElement('div');
            card.className = `story-card ${storyType}`;
            card.innerHTML = `
                <div class="story-type ${storyType}">
                    ${storyType === 'original' ? '经典故事' : '原创故事'}
                </div>
                <div class="story-title">${storyName}</div>
                <div class="story-desc">${storyDesc}</div>
                <div class="story-stats">
                    <div class="stat-item">
                        <div class="stat-number">${stats.count}</div>
                        <div class="stat-label">续写</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${formatTime(stats.lastUpdate)}</div>
                        <div class="stat-label">最后更新</div>
                    </div>
                </div>
                <button class="join-btn" onclick="openWriteModal('${storyId}')">
                    ${stats.count > 0 ? '继续续写' : '开始续写'}
                </button>
            `;
            
            document.getElementById('storiesGrid').appendChild(card);
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            const now = new Date();
            const diffMs = now - date;
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            
            if (diffHours < 1) return '刚刚';
            if (diffHours < 24) return `${diffHours}小时前`;
            return date.toLocaleDateString('zh-CN');
        }

        // 获取故事统计
        async function getStoryStats(storyId) {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${storyId}.md`, {
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.status === 404) {
                    return { count: 0, lastUpdate: null };
                }

                if (!response.ok) {
                    throw new Error(`GitHub API错误: ${response.status}`);
                }

                const data = await response.json();
                const content = atob(data.content);
                const lines = content.split('\n').filter(line => line.trim() && !line.startsWith('#') && !line.startsWith('作者:'));
                
                return {
                    count: lines.length,
                    lastUpdate: data.last_modified
                };

            } catch (error) {
                console.error(`获取故事 ${storyId} 统计失败:`, error);
                return { count: 0, lastUpdate: null };
            }
        }

        // 打开写作模态框
        async function openWriteModal(storyId) {
            currentStory = storyId;
            document.getElementById('modalTitle').textContent = `续写：${STORY_NAMES[storyId]}`;
            
            // 加载故事历史
            await loadStoryHistory(storyId);
            
            // 重置表单
            document.getElementById('writeForm').reset();
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            
            document.getElementById('writeModal').style.display = 'block';
        }

        // 关闭写作模态框
        function closeWriteModal() {
            document.getElementById('writeModal').style.display = 'none';
            currentStory = null;
        }

        // 加载故事历史
        async function loadStoryHistory(storyId) {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '<div style="text-align: center; padding: 20px;">正在加载故事历史...</div>';

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${storyId}.md`, {
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.status === 404) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: #7f8c8d;">暂无续写记录，赶快开始吧！</div>';
                    return;
                }

                if (!response.ok) {
                    throw new Error(`GitHub API错误: ${response.status}`);
                }

                const data = await response.json();
                const content = atob(data.content);
                const historyItems = parseStoryHistory(content);
                
                if (historyItems.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: #7f8c8d;">暂无续写记录，赶快开始吧！</div>';
                } else {
                    container.innerHTML = historyItems.map(item => `
                        <div class="history-item">
                            <div class="history-author">作者: ${item.author}</div>
                            <div class="history-content">${item.content}</div>
                            <div class="history-timestamp">${new Date(item.timestamp).toLocaleString('zh-CN')}</div>
                        </div>
                    `).join('');
                }

            } catch (error) {
                console.error('加载故事历史失败:', error);
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #e74c3c;">无法加载故事历史</div>';
            }
        }

        // 解析故事历史
        function parseStoryHistory(content) {
            const lines = content.split('\n');
            const items = [];
            let currentItem = null;

            for (const line of lines) {
                if (line.startsWith('作者:')) {
                    if (currentItem) {
                        items.push(currentItem);
                    }
                    currentItem = {
                        author: line.replace('作者:', '').trim(),
                        content: '',
                        timestamp: new Date().toISOString()
                    };
                } else if (line.trim() && currentItem && !line.startsWith('#')) {
                    if (currentItem.content) {
                        currentItem.content += '\n' + line.trim();
                    } else {
                        currentItem.content = line.trim();
                    }
                }
            }

            if (currentItem) {
                items.push(currentItem);
            }

            return items.reverse(); // 最新在前
        }

        // 提交表单
        document.getElementById('writeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!currentStory) {
                showError('请先选择一个故事');
                return;
            }

            const authorName = document.getElementById('authorName').value.trim();
            const storyContent = document.getElementById('storyContent').value.trim();

            if (!authorName || !storyContent) {
                showError('请填写作者姓名和故事内容');
                return;
            }

            if (storyContent.length < 100) {
                showError('故事内容至少需要100字');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            try {
                await submitStory(currentStory, authorName, storyContent);
                showSuccess();
                document.getElementById('writeForm').reset();
                
                // 刷新故事统计
                loadStoryStats();
                
                // 重新加载故事历史
                loadStoryHistory(currentStory);
                
            } catch (error) {
                console.error('提交失败:', error);
                showError('提交失败，请重试或联系管理员');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交续写';
            }
        });

        // 提交故事
        async function submitStory(storyId, authorName, content) {
            const timestamp = new Date().toISOString();
            const newEntry = `作者: ${authorName}\n${content}\n\n时间: ${timestamp}\n---\n\n`;

            try {
                // 获取当前文件内容
                let currentContent = '';
                try {
                    const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${storyId}.md`, {
                        headers: {
                            'Authorization': `token ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (getResponse.ok) {
                        const fileData = await getResponse.json();
                        currentContent = atob(fileData.content);
                    }
                } catch (error) {
                    // 文件不存在，创建新文件
                    console.log('创建新故事文件');
                }

                // 添加新内容
                const newContent = currentContent + newEntry;

                // 获取文件的SHA（如果存在）
                let sha = null;
                try {
                    const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${storyId}.md`, {
                        headers: {
                            'Authorization': `token ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });

                    if (getResponse.ok) {
                        const fileData = await getResponse.json();
                        sha = fileData.sha;
                    }
                } catch (error) {
                    // 文件不存在，不需要SHA
                }

                // 提交文件
                const commitData = {
                    message: `续写: ${STORY_NAMES[storyId]} - ${authorName}`,
                    content: btoa(unescape(encodeURIComponent(newContent)))
                };

                if (sha) {
                    commitData.sha = sha;
                }

                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${storyId}.md`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(commitData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(`GitHub API错误: ${response.status} - ${error.message}`);
                }

                return await response.json();

            } catch (error) {
                console.error('提交故事失败:', error);
                throw error;
            }
        }

        // 显示成功消息
        function showSuccess() {
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
        }

        // 显示错误消息
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
            setTimeout(() => {
                document.getElementById('errorMessage').style.display = 'none';
            }, 5000);
        }

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeWriteModal();
            }
        });
    </script>
</body>
</html>
