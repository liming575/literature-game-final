<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - 文学社接力小说游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
        }
        
        .admin-panel {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            min-height: 80vh;
        }
        
        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        
        .story-selector {
            margin-bottom: 30px;
        }
        
        .story-selector label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .story-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }
        
        .story-select:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(45deg, #f39c12, #e67e22);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        
        .main-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 600px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }
        
        .content-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .story-list {
            display: grid;
            gap: 15px;
        }
        
        .story-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .story-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .story-author {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .story-content {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .story-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .story-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ecf0f1;
            border-radius: 50%;
            border-top-color: #3498db;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #f5c6cb;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #c3e6cb;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #7f8c8d;
        }
        
        .close-btn:hover {
            color: #e74c3c;
        }
        
        .edit-form {
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 16px;
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        @media (max-width: 768px) {
            .admin-panel {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .sidebar {
                position: static;
            }
            
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .modal-content {
                width: 95%;
                margin: 10% auto;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 管理面板</h1>
            <p class="subtitle">文学社接力小说游戏 - 内容管理与统计分析</p>
        </header>
        
        <div class="admin-panel">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="story-selector">
                    <label for="storySelect">选择故事：</label>
                    <select class="story-select" id="storySelect">
                        <option value="library">《神秘的图书馆》</option>
                        <option value="forest">《魔法森林的传说》</option>
                        <option value="city">《时光倒流的城市》</option>
                        <option value="tutorial">《弗尔滕帝国的抉择》</option>
                        <option value="fight">《决战紫禁之巅》</option>
                        <option value="journey">《西游记新传》</option>
                    </select>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="loadAllSubmissions()">
                        加载所有提交
                    </button>
                    <button class="btn btn-success" onclick="loadStoryStats()">
                        刷新统计
                    </button>
                    <button class="btn btn-warning" onclick="exportData()">
                        导出数据
                    </button>
                    <button class="btn btn-danger" onclick="clearStory()">
                        清空故事
                    </button>
                </div>
            </div>
            
            <!-- 主内容区域 -->
            <div class="main-content">
                <!-- 统计信息 -->
                <div class="stats-grid" id="statsGrid">
                    <!-- 统计卡片将通过JavaScript动态生成 -->
                </div>
                
                <!-- 内容管理 -->
                <div class="content-section">
                    <h2 class="section-title">提交内容管理</h2>
                    <div id="contentContainer">
                        <div class="no-data">
                            请选择一个故事并点击"加载所有提交"查看内容
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 编辑模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="editModalTitle">编辑内容</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            
            <form class="edit-form" id="editForm">
                <div class="form-group">
                    <label for="editAuthor">作者：</label>
                    <input type="text" id="editAuthor" required>
                </div>
                
                <div class="form-group">
                    <label for="editContent">内容：</label>
                    <textarea id="editContent" required></textarea>
                </div>
                
                <button type="submit" class="btn btn-success">保存更改</button>
            </form>
        </div>
    </div>

    <script>
        // GitHub配置（需要配置）
        const GITHUB_CONFIG = {
            owner: 'liming575', // GitHub用户名
            repo: 'literature-game-data-v2', // 数据存储仓库
            token: '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' // 已配置的GitHub Token
        };

        // 故事名称映射
        const STORY_NAMES = {
            'library': '《神秘的图书馆》',
            'forest': '《魔法森林的传说》',
            'city': '《时光倒流的城市》',
            'tutorial': '《弗尔滕帝国的抉择》',
            'fight': '《决战紫禁之巅》',
            'journey': '《西游记新传》'
        };

        // 当前编辑的内容索引
        let currentEditIndex = -1;
        let currentStory = 'library';

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkGitHubConfig();
            loadStoryStats();
            setupEventListeners();
        });

        // 检查GitHub配置
        function checkGitHubConfig() {
            if (!GITHUB_CONFIG.owner || !GITHUB_CONFIG.repo || !GITHUB_CONFIG.token) {
                showError('⚠️ GitHub配置未完成！管理员需要配置GITHUB_CONFIG才能接收提交。');
                return false;
            }
            return true;
        }

        // 设置事件监听器
        function setupEventListeners() {
            document.getElementById('storySelect').addEventListener('change', function() {
                currentStory = this.value;
            });
            
            // 编辑表单提交
            document.getElementById('editForm').addEventListener('submit', function(e) {
                e.preventDefault();
                saveEdit();
            });
            
            // 模态框点击外部关闭
            const editModal = document.getElementById('editModal');
            editModal.addEventListener('click', function(e) {
                if (e.target === editModal) {
                    closeEditModal();
                }
            });
        }

        // 加载所有提交
        async function loadAllSubmissions() {
            if (!checkGitHubConfig()) return;
            
            const container = document.getElementById('contentContainer');
            const storyName = STORY_NAMES[currentStory];
            
            container.innerHTML = '<div class="loading">正在加载提交内容...</div>';
            
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${currentStory}.md`, {
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.status === 404) {
                    container.innerHTML = `<div class="no-data">"${storyName}" 暂无续写记录</div>`;
                    return;
                }

                if (!response.ok) {
                    throw new Error(`GitHub API错误: ${response.status}`);
                }

                const data = await response.json();
                const content = atob(data.content);
                const submissions = parseStoryContent(content);
                
                if (submissions.length === 0) {
                    container.innerHTML = `<div class="no-data">"${storyName}" 暂无续写记录</div>`;
                } else {
                    renderSubmissions(submissions);
                }

            } catch (error) {
                console.error('加载提交失败:', error);
                container.innerHTML = `<div class="error-message">加载失败: ${error.message}</div>`;
            }
        }

        // 解析故事内容
        function parseStoryContent(content) {
            const lines = content.split('\n');
            const submissions = [];
            let currentSubmission = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                
                if (line.startsWith('作者:')) {
                    if (currentSubmission) {
                        submissions.push(currentSubmission);
                    }
                    
                    currentSubmission = {
                        author: line.replace('作者:', '').trim(),
                        content: '',
                        timestamp: null,
                        lineIndex: i
                    };
                } else if (line.startsWith('时间:')) {
                    if (currentSubmission) {
                        currentSubmission.timestamp = new Date(line.replace('时间:', '').trim()).toISOString();
                    }
                } else if (line.trim() && currentSubmission && !line.startsWith('#') && line !== '---') {
                    if (currentSubmission.content) {
                        currentSubmission.content += '\n' + line.trim();
                    } else {
                        currentSubmission.content = line.trim();
                    }
                }
            }

            if (currentSubmission) {
                submissions.push(currentSubmission);
            }

            return submissions.reverse(); // 最新在前
        }

        // 渲染提交列表
        function renderSubmissions(submissions) {
            const container = document.getElementById('contentContainer');
            
            const html = `
                <div class="story-list">
                    ${submissions.map((submission, index) => `
                        <div class="story-item">
                            <div class="story-author">作者: ${submission.author}</div>
                            <div class="story-content">${submission.content}</div>
                            <div class="story-meta">
                                <span>提交时间: ${new Date(submission.timestamp).toLocaleString('zh-CN')}</span>
                                <div class="story-actions">
                                    <button class="btn btn-primary btn-sm" onclick="editSubmission(${index})">
                                        编辑
                                    </button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteSubmission(${index})">
                                        删除
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            container.innerHTML = html;
        }

        // 加载故事统计
        async function loadStoryStats() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '<div class="loading">正在加载统计...</div>';

            try {
                const stories = Object.keys(STORY_NAMES);
                const statsPromises = stories.map(storyId => getStoryStats(storyId));
                const stats = await Promise.allSettled(statsPromises);

                const totalStats = stats.reduce((acc, result) => {
                    if (result.status === 'fulfilled') {
                        acc.totalSubmissions += result.value.count;
                        acc.totalStories += 1;
                        if (result.value.count > 0) acc.activeStories += 1;
                        if (result.value.lastUpdate) {
                            if (!acc.lastUpdate || new Date(result.value.lastUpdate) > new Date(acc.lastUpdate)) {
                                acc.lastUpdate = result.value.lastUpdate;
                            }
                        }
                    }
                    return acc;
                }, { totalSubmissions: 0, totalStories: 0, activeStories: 0, lastUpdate: null });

                const statsHtml = `
                    <div class="stat-card">
                        <div class="stat-number">${totalStats.totalSubmissions}</div>
                        <div class="stat-label">总续写数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${totalStats.activeStories}</div>
                        <div class="stat-label">活跃故事</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${totalStats.totalStories}</div>
                        <div class="stat-label">总故事数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${totalStats.activeStories > 0 ? Math.round((totalStats.activeStories / totalStats.totalStories) * 100) : 0}%</div>
                        <div class="stat-label">参与率</div>
                    </div>
                `;

                statsGrid.innerHTML = statsHtml;

            } catch (error) {
                console.error('加载统计失败:', error);
                statsGrid.innerHTML = '<div class="error-message">无法加载统计信息</div>';
            }
        }

        // 获取单个故事统计
        async function getStoryStats(storyId) {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${storyId}.md`, {
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.status === 404) {
                    return { count: 0, lastUpdate: null };
                }

                if (!response.ok) {
                    throw new Error(`GitHub API错误: ${response.status}`);
                }

                const data = await response.json();
                const content = atob(data.content);
                const lines = content.split('\n').filter(line => line.trim() && !line.startsWith('#') && !line.startsWith('作者:'));
                
                return {
                    count: lines.length,
                    lastUpdate: data.last_modified
                };

            } catch (error) {
                console.error(`获取故事 ${storyId} 统计失败:`, error);
                return { count: 0, lastUpdate: null };
            }
        }

        // 编辑提交
        function editSubmission(index) {
            const storyName = STORY_NAMES[currentStory];
            const contentItems = document.querySelectorAll('.story-item');
            const item = contentItems[index];
            
            if (!item) return;
            
            const author = item.querySelector('.story-author').textContent.replace('作者: ', '');
            const content = item.querySelector('.story-content').textContent;
            
            document.getElementById('editAuthor').value = author;
            document.getElementById('editContent').value = content;
            document.getElementById('editModalTitle').textContent = `编辑 "${storyName}" 的内容`;
            
            currentEditIndex = index;
            document.getElementById('editModal').style.display = 'block';
        }

        // 保存编辑
        async function saveEdit() {
            const author = document.getElementById('editAuthor').value.trim();
            const content = document.getElementById('editContent').value.trim();
            
            if (!author || !content) {
                showError('请填写作者和内容');
                return;
            }

            try {
                // 获取当前文件内容
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${currentStory}.md`, {
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`GitHub API错误: ${response.status}`);
                }

                const fileData = await response.json();
                const content = atob(fileData.content);
                const lines = content.split('\n');
                
                // 找到对应的提交并更新
                let authorFound = false;
                let contentStartIndex = -1;
                let contentEndIndex = -1;
                
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('作者:')) {
                        const currentAuthor = lines[i].replace('作者:', '').trim();
                        if (currentAuthor === author && i === currentEditIndex) {
                            authorFound = true;
                            // 找到内容开始位置（下一行）
                            contentStartIndex = i + 1;
                            // 找到内容结束位置（下一个作者或时间标记）
                            for (let j = i + 1; j < lines.length; j++) {
                                if (lines[j].startsWith('作者:') || lines[j].startsWith('时间:')) {
                                    contentEndIndex = j;
                                    break;
                                }
                                if (j === lines.length - 1) {
                                    contentEndIndex = j + 1;
                                }
                            }
                            break;
                        }
                    }
                }

                if (!authorFound) {
                    throw new Error('找不到要编辑的提交');
                }

                // 更新内容
                lines[contentStartIndex] = content;
                if (contentEndIndex > contentStartIndex + 1) {
                    lines.splice(contentStartIndex + 1, contentEndIndex - contentStartIndex - 1);
                }

                const newContent = lines.join('\n');

                // 提交更新
                const updateResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${currentStory}.md`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `编辑提交: ${STORY_NAMES[currentStory]} - ${author}`,
                        content: btoa(unescape(encodeURIComponent(newContent))),
                        sha: fileData.sha
                    })
                });

                if (!updateResponse.ok) {
                    throw new Error(`更新失败: ${updateResponse.status}`);
                }

                showSuccess('编辑保存成功');
                closeEditModal();
                loadAllSubmissions();
                loadStoryStats();

            } catch (error) {
                console.error('保存编辑失败:', error);
                showError(`保存失败: ${error.message}`);
            }
        }

        // 删除提交
        async function deleteSubmission(index) {
            if (!confirm('确定要删除这个提交吗？此操作不可撤销。')) {
                return;
            }

            try {
                // 获取当前文件内容
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${currentStory}.md`, {
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`GitHub API错误: ${response.status}`);
                }

                const fileData = await response.json();
                const content = atob(fileData.content);
                const lines = content.split('\n');
                
                // 找到要删除的提交
                let authorStartIndex = -1;
                let authorEndIndex = -1;
                let targetAuthor = '';
                
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('作者:')) {
                        const currentAuthor = lines[i].replace('作者:', '').trim();
                        let submissionCount = -1;
                        
                        // 计算到当前提交为止的提交数量
                        for (let j = 0; j <= i; j++) {
                            if (lines[j].startsWith('作者:')) {
                                submissionCount++;
                            }
                        }
                        
                        // 如果这是我们要删除的提交（通过索引判断）
                        if (submissionCount === index) {
                            targetAuthor = currentAuthor;
                            authorStartIndex = i;
                            
                            // 找到提交结束位置
                            for (let j = i + 1; j < lines.length; j++) {
                                if (lines[j].startsWith('作者:') || (lines[j].trim() === '---' && j < lines.length - 1 && lines[j + 1].trim() === '')) {
                                    authorEndIndex = j;
                                    break;
                                }
                                if (j === lines.length - 1) {
                                    authorEndIndex = j + 1;
                                }
                            }
                            break;
                        }
                    }
                }

                if (authorStartIndex === -1) {
                    throw new Error('找不到要删除的提交');
                }

                // 删除提交
                lines.splice(authorStartIndex, authorEndIndex - authorStartIndex);
                const newContent = lines.join('\n');

                // 提交更新
                const updateResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${currentStory}.md`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `删除提交: ${STORY_NAMES[currentStory]} - ${targetAuthor}`,
                        content: btoa(unescape(encodeURIComponent(newContent))),
                        sha: fileData.sha
                    })
                });

                if (!updateResponse.ok) {
                    throw new Error(`删除失败: ${updateResponse.status}`);
                }

                showSuccess('删除成功');
                loadAllSubmissions();
                loadStoryStats();

            } catch (error) {
                console.error('删除提交失败:', error);
                showError(`删除失败: ${error.message}`);
            }
        }

        // 清空故事
        async function clearStory() {
            if (!confirm('确定要清空整个故事吗？所有续写都将被删除，此操作不可撤销！')) {
                return;
            }

            try {
                // 获取文件SHA
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${currentStory}.md`, {
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`获取文件失败: ${response.status}`);
                }

                const fileData = await response.json();

                // 删除文件
                const deleteResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/stories/${currentStory}.md`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `清空故事: ${STORY_NAMES[currentStory]}`,
                        content: btoa(unescape(encodeURIComponent('# ' + STORY_NAMES[currentStory] + '\n\n暂无续写记录\n'))),
                        sha: fileData.sha
                    })
                });

                if (!deleteResponse.ok) {
                    throw new Error(`清空失败: ${deleteResponse.status}`);
                }

                showSuccess('故事清空成功');
                loadAllSubmissions();
                loadStoryStats();

            } catch (error) {
                console.error('清空故事失败:', error);
                showError(`清空失败: ${error.message}`);
            }
        }

        // 导出数据
        function exportData() {
            const storyName = STORY_NAMES[currentStory];
            const contentItems = document.querySelectorAll('.story-item');
            
            if (contentItems.length === 0) {
                showError('没有数据可导出');
                return;
            }

            let exportContent = `${storyName}\n`;
            exportContent += '='.repeat(storyName.length) + '\n\n';

            contentItems.forEach((item, index) => {
                const author = item.querySelector('.story-author').textContent.replace('作者: ', '');
                const content = item.querySelector('.story-content').textContent;
                const timestamp = item.querySelector('.story-meta span').textContent.replace('提交时间: ', '');
                
                exportContent += `### ${index + 1}. ${author}\n`;
                exportContent += `**时间**: ${timestamp}\n\n`;
                exportContent += `${content}\n\n`;
                exportContent += '---\n\n';
            });

            const blob = new Blob([exportContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${storyName}_导出_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);

            showSuccess('数据导出成功');
        }

        // 关闭编辑模态框
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditIndex = -1;
        }

        // 显示成功消息
        function showSuccess(message) {
            // 移除之前的消息
            const existingMessages = document.querySelectorAll('.success-message, .error-message');
            existingMessages.forEach(msg => msg.remove());

            const successDiv = document.createElement('div');
            successDiv.className = 'success-message';
            successDiv.textContent = message;
            document.querySelector('.main-content').insertBefore(successDiv, document.querySelector('.content-section'));
            
            setTimeout(() => {
                successDiv.remove();
            }, 3000);
        }

        // 显示错误消息
        function showError(message) {
            // 移除之前的消息
            const existingMessages = document.querySelectorAll('.success-message, .error-message');
            existingMessages.forEach(msg => msg.remove());

            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            document.querySelector('.main-content').insertBefore(errorDiv, document.querySelector('.content-section'));
            
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeEditModal();
            }
        });
    </script>
</body>
